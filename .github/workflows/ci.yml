name: CI

# BEFORE FIRST RUN, replace <firstname>-<lastname>-sentinelops below (in the
# "Build and push" step's `tags:` list) with your actual repo name, e.g.
# sharaz-<yourlastname>-sentinelops — this must match your Docker Hub repo
# name exactly, and lowercase, per the assignment's naming rule.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ---------------------------------------------------------------------
  # Job 1: lint (as a step, not its own job) -> test, against a real
  # Postgres 16 service container. Must be green before the docker job
  # is even allowed to start.
  # ---------------------------------------------------------------------
  lint-and-test:
    runs-on: ubuntu-latest

    services:
      db:
        image: postgres:16
        env:
          POSTGRES_USER: appuser
          POSTGRES_PASSWORD: localdevpassword
          POSTGRES_DB: sentinelops
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U appuser -d sentinelops"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
        POSTGRES_USER: appuser
        POSTGRES_PASSWORD: localdevpassword
        POSTGRES_HOST: localhost
        POSTGRES_PORT: 5432
        POSTGRES_DB: sentinelops
        APP_ENV: ci
        LOG_LEVEL: INFO

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12 with pip cache
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Ruff lint
        run: ruff check .

      - name: Pytest with coverage gate
        run: pytest --cov=app --cov-fail-under=60 --cov-report=term-missing

  # ---------------------------------------------------------------------
  # Job 2: build the image and push it to Docker Hub, but ONLY on a
  # push to main (never on a pull_request, and never from a fork).
  # ---------------------------------------------------------------------
  docker:
    runs-on: ubuntu-latest
    needs: lint-and-test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Compute short SHA
        id: vars
        run: echo "short_sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Build and push (:latest + :short-sha)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/sharaz-soni-sentinelops:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/sharaz-soni-sentinelops:${{ steps.vars.outputs.short_sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max